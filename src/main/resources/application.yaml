spring:
  application:
    name: cosy-domain-provider
  datasource:
    url: jdbc:postgresql://localhost:5432/cosy
    username: cosy
    password: cosy
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

aws:
  region: eu-central-1
  route53:
    hosted-zone-id: ${AWS_HOSTED_ZONE_ID}
    domain: ${AWS_DOMAIN}
    default-ttl: 300

jwt:
  secret-key: ${COSY_DOMAIN_PROVIDER_JWT_SECRET_KEY:e8996bf24977ce5615015c717447911799207025d1998a01256b7b7717bac18e} #change in prod
  identity-token-expiration-time: 3600000 #1 hour
  refresh-token-expiration-time: 2678400000 #1 month
  mfa-challenge-token-expiration-time: 300000 #5 minutes

client:
  mail:
    url: ${MAIL_API_URL}
    api-key: ${MAIL_API_KEY}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  product-id: ${STRIPE_PRODUCT_ID}
  price-id: ${STRIPE_PRICE_ID}

oauth:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  secure-cookie: ${OAUTH_SECURE_COOKIE:false}
  providers:
    google:
      client-id: ${OAUTH_GOOGLE_CLIENT_ID}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
      scope: openid email profile
      callback-uri: ${OAUTH_GOOGLE_CALLBACK_URI:http://localhost:8080/api/v1/auth/oauth/google/callback}
    github:
      client-id: ${OAUTH_GITHUB_CLIENT_ID}
      client-secret: ${OAUTH_GITHUB_CLIENT_SECRET}
      authorization-uri: https://github.com/login/oauth/authorize
      token-uri: https://github.com/login/oauth/access_token
      user-info-uri: https://api.github.com/user
      scope: read:user,user:email
      callback-uri: ${OAUTH_GITHUB_CALLBACK_URI:http://localhost:8080/api/v1/auth/oauth/github/callback}
    discord:
      client-id: ${OAUTH_DISCORD_CLIENT_ID}
      client-secret: ${OAUTH_DISCORD_CLIENT_SECRET}
      authorization-uri: https://discord.com/api/oauth2/authorize
      token-uri: https://discord.com/api/oauth2/token
      user-info-uri: https://discord.com/api/users/@me
      scope: identify email
      callback-uri: ${OAUTH_DISCORD_CALLBACK_URI:http://localhost:8080/api/v1/auth/oauth/discord/callback}

admin:
  secret-key: ${ADMIN_SECRET_KEY:change-me-in-prod}

turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY}

staging:
  auth:
    enabled: ${STAGING_AUTH_ENABLED:false}
    username: ${STAGING_AUTH_USERNAME:staging}
    password: ${STAGING_AUTH_PASSWORD:change-me}
  captcha-bypass:
    enabled: ${STAGING_CAPTCHA_BYPASS_ENABLED:false}

rate-limit:
  auth:
    requests: 10
    period-seconds: 60
  global:
    requests: 60
    period-seconds: 60

subdomain:
  max-per-free-user: 1
  max-per-plus-user: 5
  reserved-labels:
    - www
    - api
    - admin
    - mail
    - ftp
    - smtp
    - pop
    - imap
    - ns
    - ns1
    - ns2
    - dns
    - root
    - localhost
    - auth
    - login
    - register
    - cdn
    - static
    - assets
    - app
    - dev
    - staging
    - prod
    - production
    - test
    - stage
    - status
    - support
    - help
    - docs
    - blog
