name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']

env:
  IMAGE_NAME: magenta-mause/cosy-domain-provider-backend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=main-,format=short,enable=${{ github.ref_type == 'branch' }}
            type=raw,value=staging-latest,enable=${{ github.ref_type == 'branch' }}
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=prod-latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-staging:
    needs: build-and-push
    if: github.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Clone deployment repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/magenta-mause/cosy-domain-provider-deployment.git deploy-repo

      - name: Update backend image tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd deploy-repo/overlays/staging
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}:main-${SHORT_SHA}

      - name: Commit and push
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git commit -am "ci: update backend image to main-${SHORT_SHA}"
          git push

  update-prod:
    needs: build-and-push
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - name: Set up kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Clone deployment repo
        run: |
          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/magenta-mause/cosy-domain-provider-deployment.git deploy-repo

      - name: Update backend image tag
        run: |
          cd deploy-repo/overlays/prod
          kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}

      - name: Commit and push
        run: |
          cd deploy-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet && git diff --staged --quiet || git commit -am "ci: update backend image to ${{ github.ref_name }}"
          git push
