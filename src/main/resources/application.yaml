spring:
  application:
    name: cosy-domain-provider
  datasource:
    url: jdbc:postgresql://localhost:5432/cosy
    username: cosy
    password: cosy
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

aws:
  region: eu-central-1
  route53:
    hosted-zone-id: ${AWS_HOSTED_ZONE_ID}
    domain: ${AWS_DOMAIN}
    default-ttl: 300

jwt:
  secret-key: ${COSY_DOMAIN_PROVIDER_JWT_SECRET_KEY:e8996bf24977ce5615015c717447911799207025d1998a01256b7b7717bac18e} #change in prod
  identity-token-expiration-time: 3600000 #1 hour
  refresh-token-expiration-time: 2678400000 #1 month

client:
  mail:
    url: ${MAIL_API_URL}
    api-key: ${MAIL_API_KEY}

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

stripe:
  api-key: ${STRIPE_API_KEY}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET}
  product-id: ${STRIPE_PRODUCT_ID}
  price-id: ${STRIPE_PRICE_ID}

subdomain:
  max-per-free-user: 1
  max-per-plus-user: 5
  reserved-labels:
    - www
    - api
    - admin
    - mail
    - ftp
    - smtp
    - pop
    - imap
    - ns
    - ns1
    - ns2
    - dns
    - root
    - localhost
    - auth
    - login
    - register
    - cdn
    - static
    - assets
    - app
    - dev
    - staging
    - prod
    - production
    - test
    - stage
    - status
    - support
    - help
    - docs
    - blog
