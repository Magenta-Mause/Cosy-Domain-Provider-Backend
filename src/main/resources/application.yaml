spring:
  application:
    name: cosy-domain-provider
  datasource:
    url: jdbc:postgresql://localhost:5432/cosy
    username: cosy
    password: cosy
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect


aws:
  region: eu-central-1
  route53:
    hosted-zone-id: ${AWS_HOSTED_ZONE_ID}
    domain: ${AWS_DOMAIN}
    default-ttl: 300

jwt:
  secret-key: ${COSY_DOMAIN_PROVIDER_JWT_SECRET_KEY:e8996bf24977ce5615015c717447911799207025d1998a01256b7b7717bac18e} #change in prod
  identity-token-expiration-time: 3600000 #1 hour
  refresh-token-expiration-time: 2678400000 #1 month

client:
  mail:
    url: ${MAIL_API_URL}
    api-key: ${MAIL_API_KEY}

oauth:
  frontend-url: http://localhost:5173
  providers:
    google:
      client-id: ${OAUTH_GOOGLE_CLIENT_ID}
      client-secret: ${OAUTH_GOOGLE_CLIENT_SECRET}
      authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
      token-uri: https://oauth2.googleapis.com/token
      user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
      scope: openid email profile
      callback-uri: http://localhost:8080/api/v1/auth/oauth/google/callback
    github:
      client-id: ${OAUTH_GITHUB_CLIENT_ID}
      client-secret: ${OAUTH_GITHUB_CLIENT_SECRET}
      authorization-uri: https://github.com/login/oauth/authorize
      token-uri: https://github.com/login/oauth/access_token
      user-info-uri: https://api.github.com/user
      scope: read:user,user:email
      callback-uri: http://localhost:8080/api/v1/auth/oauth/github/callback
    discord:
      client-id: ${OAUTH_DISCORD_CLIENT_ID}
      client-secret: ${OAUTH_DISCORD_CLIENT_SECRET}
      authorization-uri: https://discord.com/api/oauth2/authorize
      token-uri: https://discord.com/api/oauth2/token
      user-info-uri: https://discord.com/api/users/@me
      scope: identify email
      callback-uri: http://localhost:8080/api/v1/auth/oauth/discord/callback

subdomain:
  max-per-user: 5
  reserved-labels:
    - www
    - api
    - admin
    - mail
    - ftp
    - smtp
    - pop
    - imap
    - ns
    - ns1
    - ns2
    - dns
    - root
    - localhost
    - auth
    - login
    - register
    - cdn
    - static
    - assets
    - app
    - dev
    - staging
    - prod
    - production
    - test
    - stage
    - status
    - support
    - help
    - docs
    - blog
